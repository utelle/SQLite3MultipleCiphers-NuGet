# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build & Publish NuGet packages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        type: choice
        default: dry-run
        options:
          - dry-run
          - release

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    permissions:
      id-token: write       # OIDC token issuance for keyless signing / NuGet trusted publishing
      contents: write       # create GitHub Release
      attestations: write   # write build provenance attestation
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      MODE: ${{ inputs.mode }}

    steps:
    - name: Checkout source
      uses: actions/checkout@v7

    - name: Extract version from Versions.props
      id: version
      run: |
        [xml]$xml = Get-Content Versions.props
        $version = $xml.Project.PropertyGroup.Sqlite3MCVersion
        echo "VERSION=$version" >> $env:GITHUB_ENV
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Download release archive
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        BASE=https://github.com/utelle/SQLite3MultipleCiphers-cb/releases/download/$TAG
        curl -fL --retry 3 --retry-delay 5 -o "$ARCHIVE" "$BASE/$ARCHIVE"
        curl -fL --retry 3 --retry-delay 5 -o SHA256SUMS.txt "$BASE/SHA256SUMS.txt"
        curl -fL --retry 3 --retry-delay 5 -o manifest.json "$BASE/manifest.json"

    - name: Verify archive exists
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        if [ ! -f "$ARCHIVE" ]; then
          echo "Archive not found!"
          exit 1
        fi

    # -------------------------------------------------
    # VERIFY UPSTREAM PROVENANCE (closes the SLSA chain)
    # Cryptographically verifies the -cb binary archive against its build
    # provenance, instead of trusting only checksums shipped in the same
    # release. Requires release.yml in -cb to attest (see that repo).
    # -------------------------------------------------
    - name: Verify build provenance of upstream binaries
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        gh attestation verify "$ARCHIVE" \
          --repo utelle/SQLite3MultipleCiphers-cb

    - name: Extract binaries
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        mkdir -p cb/bld/bin
        tar -xzf release-$TAG.tar.gz -C cb/bld/bin

        mkdir -p cb/bld/bin/sqlite3mc
        mv manifest.json cb/bld/bin/sqlite3mc/
        mv SHA256SUMS.txt cb/bld/bin/sqlite3mc/

    # jq is preinstalled on the windows-latest runner image — no action needed.
    #- uses: dcarbone/install-jq-action@v2

    - name: Validate binary release consistency
      shell: bash
      run: |
        set -e

        echo "=== Load version ==="
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        echo "Expected version: $VERSION"

        echo "=== Check manifest exists ==="
        MANIFEST="cb/bld/bin/sqlite3mc/manifest.json"
        CHECKSUMS="cb/bld/bin/sqlite3mc/SHA256SUMS.txt"

        if [ ! -f "$MANIFEST" ]; then
          echo "ERROR: Manifest not found"
          exit 1
        fi

        if [ ! -f "$CHECKSUMS" ]; then
          echo "ERROR: Checksums file not found"
          exit 1
        fi

        echo "=== Validate manifest version ==="
        MANIFEST_VERSION=$(jq -r '.version' "$MANIFEST")

        if [ "$MANIFEST_VERSION" != "v$VERSION" ]; then
          echo "ERROR: Version mismatch (manifest=$MANIFEST_VERSION, expected=v$VERSION)"
          exit 1
        fi

        echo "=== Validate file list ==="
        cd cb/bld/bin

        # Collect all files in release (without metadata files)
        find sqlite3mc -type f \
          ! -name "SHA256SUMS.txt" \
          ! -name "manifest.json" \
          | sort > actual_files.txt

        jq --version
        jq -r '.files[]' sqlite3mc/manifest.json | sort > expected_files.txt

        echo "=== DIFF OUTPUT ==="
        diff -u actual_files.txt expected_files.txt || true

        echo "=== Validate checksums ==="
        grep -v "$ARCHIVE" sqlite3mc/SHA256SUMS.txt > SHA256SUMS.filtered.txt
        sha256sum -c SHA256SUMS.filtered.txt

        echo "=== OK: Binary release is consistent ==="

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Setup .NET for Android and iOS
      run: dotnet workload install android ios

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:GeneratePackageOnBuild=false

    - name: Show artifacts
      shell: pwsh
      run: Get-ChildItem -Recurse artifacts -Include *.dll | Select-Object FullName

    - name: Upload signing artifacts
      id: upload-unsigned-win
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dlls-to-sign
        path: |
          artifacts/bin/**/SQLitePCLRaw.batteries_v2.dll
          artifacts/bin/**/SQLite3MC.PCLRaw.provider.dll

    - name: Submit signing request (SignPath)
      uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
        project-slug: 'SQLite3MultipleCiphers'
        artifact-configuration-slug: 'windows-binaries-cb'
        signing-policy-slug: ${{ inputs.mode == 'release' && 'release-signing' || 'test-signing' }}
        github-artifact-id: '${{ steps.upload-unsigned-win.outputs.artifact-id }}'
        wait-for-completion: true
        # release-signing typically requires manual approval -> wait longer
        wait-for-completion-timeout-in-seconds: 1800
        output-artifact-directory: 'signed-win'

    - name: Restore signed Windows binaries
      shell: pwsh
      run: |
        # SignPath returns the same tree structure; overlay the signed PE files
        # back over cb/bld/bin so "Upload artifacts" carries the signed ones.
        Copy-Item signed-win/* artifacts/bin/ -Recurse -Force
        Get-ChildItem -Recurse artifacts/bin -Include *.dll,*.exe | Select-Object FullName

    - name: Pack
      run: dotnet pack --no-build --configuration Release

    - name: Show list of NuGet packages
      run: Get-ChildItem -Recurse "artifacts\package\release"

    # -------------------------------------------------
    # CODE SIGNING (SignPath) — NuGet author-sign the .nupkg packages HERE,
    # before the SLSA provenance is generated and before they are pushed, so the
    # attested AND published package is the SIGNED one. NuGet signing mutates the
    # package bytes; signing must therefore come first, otherwise the attestation
    # digest would not match the published file.
    #
    #   dry-run -> test-signing    (self-signed TEST cert; exercises the wiring,
    #                               NOT pushed — see push step, release-only)
    #   release -> release-signing (production cert; pushed to nuget.org)
    #
    # IMPORTANT (nuget.org): it accepts ONLY packages signed with a certificate
    # registered on the account, and self-signed TEST certificates are rejected.
    # Once any certificate is registered, ALL pushes must be signed. Register the
    # SignPath production certificate (DER .cer) on the nuget.org account BEFORE
    # the first signed `release`. The test-certificate phase therefore validates
    # signing in `dry-run` only (no push).
    # -------------------------------------------------
    - name: Upload unsigned NuGet packages
      id: upload-unsigned-nupkg
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: unsigned-nupkg
        path: artifacts/package/release/*.nupkg
        if-no-files-found: error

    - name: Submit signing request (SignPath)
      uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
        project-slug: 'SQLite3MultipleCiphers-NuGet'
        artifact-configuration-slug: 'nuget-packages'
        signing-policy-slug: ${{ inputs.mode == 'release' && 'release-signing' || 'test-signing' }}
        github-artifact-id: '${{ steps.upload-unsigned-nupkg.outputs.artifact-id }}'
        wait-for-completion: true
        # release-signing typically requires manual approval -> wait longer
        wait-for-completion-timeout-in-seconds: 1800
        output-artifact-directory: 'signed-nupkg'

    - name: Replace packages with signed versions
      shell: pwsh
      run: |
        # Overwrite the unsigned .nupkg with the signed ones (same file names) so
        # the provenance attestation and `dotnet nuget push` use the signed bytes.
        Copy-Item signed-nupkg/*.nupkg artifacts/package/release/ -Force
        Get-ChildItem artifacts/package/release/*.nupkg

    - name: Upload signed NuGet packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: signed-nupkg
        path: artifacts/package/release/*.nupkg

    # -------------------------------------------------
    # MODE INFO
    # -------------------------------------------------
    - name: Release mode info
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        echo "=============================="
        echo "MODE: $MODE"
        echo "VERSION: $VERSION"
        echo "ARCHIVE: $ARCHIVE"
        echo "=============================="

        case "$MODE" in
          dry-run)
            echo "🧪 DRY RUN MODE (build tested, no release)"
            ;;
          release)
            echo "🚀 REAL RELEASE MODE (will publish)"
            ;;
        esac

    - name: Generate SLSA provenance (NuGet packages)
      if: ${{ inputs.mode == 'release' }}
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: |
          artifacts/package/release/**/*.nupkg

    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      if: ${{ inputs.mode == 'release' }}
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    
    # Push the packages
    - name: Push NuGet packages
      if: ${{ inputs.mode == 'release' }}
      shell: pwsh
      run: |
        $packages = Get-ChildItem -Path "artifacts/package/release" -Filter "*.nupkg"
        foreach ($pkg in $packages) {
            Write-Host "Pushing $($pkg.FullName)"
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json
        }
      env:
        NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}

    - name: Create GitHub Release
      if: ${{ inputs.mode == 'release' }}
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: SQLite3MC ${{ steps.version.outputs.version }} NuGet Packages
        body: |
          ## Changes

          - See detailed [change log](https://github.com/utelle/SQLite3MultipleCiphers-NuGet/blob/main/CHANGELOG.md#v${{ steps.version.outputs.version }})
          
          ## NuGet Packages

          This release is available on NuGet.org:

          - https://www.nuget.org/packages?q=sqlite3mc

          The project consists of the following 3 NuGet packages (downloadable from [NuGet.org](https://nuget.org)):

          - [SQLite3MC.PCLRaw.bundle](https://www.nuget.org/packages/SQLite3MC.PCLRaw.bundle), depends on `provider` and `lib`
          - [SQLite3MC.PCLRaw.provider](https://www.nuget.org/packages/SQLite3MC.PCLRaw.provider), depends on [SQLitePCLRaw.core](https://www.nuget.org/packages/SQLitePCLRaw.core/) (>= 3.0.2)
          - [SQLite3MC.PCLRaw.lib](https://www.nuget.org/packages/SQLite3MC.PCLRaw.lib), no dependencies

          ## Deprecated packages `SQLitePCLRaw.*e_sqlite3mc`

          The following packages are deprecated and no longer maintained:

          - [SQLitePCLRaw.bundle_e_sqlite3mc](https://www.nuget.org/packages/SQLitePCLRaw.bundle_e_sqlite3mc)
          - [SQLitePCLRaw.provider.e_sqlite3mc](https://www.nuget.org/packages/SQLitePCLRaw.provider.e_sqlite3mc)
          - [SQLitePCLRaw.lib.e_sqlite3mc](https://www.nuget.org/packages/SQLitePCLRaw.lib.e_sqlite3mc)

          Please use the packages [SQLite3MC.PCLRaw.bundle](https://www.nuget.org/packages/SQLite3MC.PCLRaw.bundle), [SQLite3MC.PCLRaw.provider](https://www.nuget.org/packages/SQLite3MC.PCLRaw.provider), and [SQLite3MC.PCLRaw.lib](https://www.nuget.org/packages/SQLite3MC.PCLRaw.lib) instead.

          ## Build & Integrity

          - Native binaries are validated using SHA256 checksums
          - NuGet packages are built and published exclusively through GitHub Actions CI
          - Builds are executed in a controlled, ephemeral CI environment
          - Build inputs (source revision, workflow definition, and dependencies) are recorded as part of the build process
          - GitHub build provenance is generated and cryptographically attested (SLSA-aligned provenance)

          ### Verification

          Build provenance can be verified using the GitHub CLI:
          ```
          gh attestation verify <package.nupkg>
          ```

          Alternatively, attestations can be inspected via the corresponding GitHub Actions workflow run in the repository.
