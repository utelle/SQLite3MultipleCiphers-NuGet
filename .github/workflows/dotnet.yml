# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Extract version from Versions.props
      id: version
      run: |
        [xml]$xml = Get-Content Versions.props
        $version = $xml.Project.PropertyGroup.Sqlite3MCVersion
        echo "VERSION=$version" >> $env:GITHUB_ENV
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Download release archive
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        curl -L \
          -o $ARCHIVE \
          https://github.com/utelle/SQLite3MultipleCiphers-cb/releases/download/$TAG/$ARCHIVE

    - name: Verify archive exists
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        if [ ! -f "$ARCHIVE" ]; then
          echo "Archive not found!"
          exit 1
        fi

    - name: Extract binaries
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.version }}
        TAG=v$VERSION
        ARCHIVE=release-$TAG.tar.gz
        mkdir -p cb/bld/bin
        tar -xzf release-$TAG.tar.gz -C cb/bld/bin

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - run: dotnet workload install android ios

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - uses: actions/upload-artifact@v7
      with:
        name: packages
        path: artifacts\package\release\

    - name: Test
      run: dotnet test Tests\Tests --verbosity normal

  test-alpine:
    needs: build
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:9.0-alpine
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: packages
        path: artifacts/package/release/
    - name: Test
      run: dotnet test Tests/Tests --verbosity normal

  test-ubuntu:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - uses: actions/download-artifact@v8
      with:
        name: packages
        path: artifacts/package/release/
    - name: Test
      run: dotnet test Tests/Tests --verbosity normal

  test-macos:
    needs: build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - uses: actions/download-artifact@v8
      with:
        name: packages
        path: artifacts/package/release/
    - name: Test
      run: dotnet test Tests/Tests --verbosity normal
